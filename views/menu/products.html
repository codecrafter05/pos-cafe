{% extends "base.html" %}
{% block title %}Pod Café — Products{% endblock %}

{% block content %}
<div class="page-breadcrumb d-none d-sm-flex align-items-center mb-3">
  <div class="breadcrumb-title pe-3">Products</div>
  <div class="ps-3">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0 p-0">
        <li class="breadcrumb-item"><a href="/dashboard"><i class="material-icons-outlined">home</i></a></li>
        <li class="breadcrumb-item active" aria-current="page">Products</li>
      </ol>
    </nav>
  </div>
  <div class="ms-auto">
    <a class="btn btn-grd-primary rounded-3 px-4" href="/menu/products/new" id="prodNewLink">New product</a>
  </div>
</div>

<div class="card rounded-4">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th class="text-end">Price</th>
            <th class="text-end">Cost</th>
            <th>Active</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="prodTableBody"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  function esc(s) { return String(s||'').replace(/[&<>"']/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]); }); }

  document.addEventListener('DOMContentLoaded', function () {
    var p = PodCafe.payloadFromToken(PodCafe.getToken());
    if (p && p.role === 'cashier') { window.location.replace('/pos'); return; }
    document.getElementById('prodNewLink').href = '/menu/products/0';

    (async function () {
      var [rc, rp] = await Promise.all([
        PodCafe.apiFetch('/api/v1/categories'),
        PodCafe.apiFetch('/api/v1/products')
      ]);
      var cats = await rc.json();
      var products = await rp.json();
      var cmap = {};
      cats.forEach(function (c) { cmap[c.id] = c.name; });
      var tb = document.getElementById('prodTableBody');
      products.forEach(function (r) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td><div class="fw-semibold">' + esc(r.name) + '</div>' +
          '<div class="text-secondary small">' + esc(r.name_ar || '') + '</div></td>' +
          '<td class="text-secondary">' + esc(cmap[r.category_id] || '') + '</td>' +
          '<td class="text-end fw-semibold">' + PodCafe.currency(r.price) + '</td>' +
          '<td class="text-end text-secondary">' + PodCafe.currency(r.cost_price) + '</td>' +
          '<td>' + (r.is_active ? '<span class="badge bg-success bg-opacity-10 text-success rounded-pill">Yes</span>' :
            '<span class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill">No</span>') + '</td>' +
          '<td class="text-end"><a class="btn btn-sm btn-outline-primary rounded-3" href="/menu/products/' + r.id + '">Edit</a></td>';
        tb.appendChild(tr);
      });
    })();
  });
})();
</script>
{% endblock %}
