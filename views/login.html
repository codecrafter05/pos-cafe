<!doctype html>
<html lang="en" data-bs-theme="blue-theme">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pod Café — Login</title>
  <link rel="icon" href="/assets/images/favicon-32x32.png" type="image/png">
  <link href="/assets/css/pace.min.css" rel="stylesheet">
  <script src="/assets/js/pace.min.js"></script>
  <link href="/assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
  <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
  <link href="/assets/css/bootstrap-extended.css" rel="stylesheet">
  <link href="/sass/main.css" rel="stylesheet">
  <link href="/sass/dark-theme.css" rel="stylesheet">
  <link href="/sass/blue-theme.css" rel="stylesheet">
  <link href="/sass/responsive.css" rel="stylesheet">
</head>

<body>
  <div class="mx-3 mx-lg-0">
    <div class="card my-5 col-xl-9 col-xxl-8 mx-auto rounded-4 overflow-hidden p-4">
      <div class="row g-4">

        <!-- Left: Form -->
        <div class="col-lg-6 d-flex">
          <div class="card-body">
            <h3 class="fw-bold mb-1">☕ Pod Café</h3>
            <h5 class="fw-bold mt-3">Sign In</h5>
            <p class="mb-0 text-secondary">Enter your credentials to access the dashboard</p>

            <!-- Error alert -->
            <div id="errorAlert" class="alert alert-danger mt-3 d-none" role="alert"></div>

            <div class="form-body mt-4">
              <form id="loginForm">
                <div class="mb-3">
                  <label for="inputEmail" class="form-label">Email Address</label>
                  <input type="text" class="form-control" id="inputEmail"
                    placeholder="admin@example.com" required>
                </div>
                <div class="mb-3">
                  <label for="inputPassword" class="form-label">Password</label>
                  <div class="input-group" id="show_hide_password">
                    <input type="password" class="form-control border-end-0"
                      id="inputPassword" placeholder="Enter password" required>
                    <a href="javascript:;" class="input-group-text bg-transparent">
                      <i class="bi bi-eye-slash-fill"></i>
                    </a>
                  </div>
                </div>
                <div class="d-grid mt-4">
                  <button type="submit" class="btn btn-grd-primary" id="loginBtn">
                    <span id="btnText">Login</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Right: Illustration -->
        <div class="col-lg-6 d-lg-flex d-none">
          <div class="p-3 rounded-4 w-100 d-flex align-items-center justify-content-center bg-grd-primary">
            <img src="/assets/images/auth/login1.png" class="img-fluid" alt="">
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/assets/js/jquery.min.js"></script>
  <script src="/assets/js/bootstrap.bundle.min.js"></script>
  <script>
    // Redirect to dashboard if already logged in
    if (localStorage.getItem('access_token')) {
      window.location.href = '/dashboard';
    }

    // Toggle password visibility
    $('#show_hide_password a').on('click', function () {
      const input = $('#show_hide_password input');
      const icon = $('#show_hide_password i');
      if (input.attr('type') === 'password') {
        input.attr('type', 'text');
        icon.removeClass('bi-eye-slash-fill').addClass('bi-eye-fill');
      } else {
        input.attr('type', 'password');
        icon.removeClass('bi-eye-fill').addClass('bi-eye-slash-fill');
      }
    });

    // Login form submit
    $('#loginForm').on('submit', async function (e) {
      e.preventDefault();
      const email = $('#inputEmail').val().trim();
      const password = $('#inputPassword').val();
      const errorAlert = $('#errorAlert');
      const btnText = $('#btnText');
      const spinner = $('#btnSpinner');
      const loginBtn = $('#loginBtn');

      errorAlert.addClass('d-none');
      loginBtn.attr('disabled', true);
      btnText.text('Signing in...');
      spinner.removeClass('d-none');

      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('access_token', data.access_token);
          window.location.href = '/dashboard';
        } else {
          const msg = data.detail || 'Login failed. Please check your credentials.';
          errorAlert.text(typeof msg === 'string' ? msg : 'Invalid credentials').removeClass('d-none');
          loginBtn.attr('disabled', false);
          btnText.text('Login');
          spinner.addClass('d-none');
        }
      } catch (err) {
        errorAlert.text('Network error. Please try again.').removeClass('d-none');
        loginBtn.attr('disabled', false);
        btnText.text('Login');
        spinner.addClass('d-none');
      }
    });
  </script>
</body>
</html>
