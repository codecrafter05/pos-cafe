<!doctype html>
<html lang="en" data-bs-theme="blue-theme">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
  (function () {
    try {
      var t = localStorage.getItem('podcafe_bs_theme');
      if (t && /^(blue-theme|light|dark|semi-dark|bodered-theme)$/.test(t)) {
        document.documentElement.setAttribute('data-bs-theme', t);
      }
    } catch (e) {}
  })();
  </script>
  <title>{% block title %}Pod Café{% endblock %}</title>
  <link rel="icon" href="/assets/images/favicon-32x32.png" type="image/png">
  <link href="/assets/css/pace.min.css" rel="stylesheet">
  <script src="/assets/js/pace.min.js"></script>
  <link href="/assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
  <link href="/assets/plugins/metismenu/metisMenu.min.css" rel="stylesheet">
  <link href="/assets/plugins/metismenu/mm-vertical.css" rel="stylesheet">
  <link href="/assets/plugins/simplebar/css/simplebar.css" rel="stylesheet">
  <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
  <link href="/assets/css/bootstrap-extended.css" rel="stylesheet">
  <link href="/sass/main.css" rel="stylesheet">
  <link href="/sass/dark-theme.css" rel="stylesheet">
  <link href="/sass/blue-theme.css" rel="stylesheet">
  <link href="/sass/semi-dark.css" rel="stylesheet">
  <link href="/sass/bordered-theme.css" rel="stylesheet">
  <link href="/sass/responsive.css" rel="stylesheet">
  <link href="/sass/podcafe-layout.css" rel="stylesheet">
  {% block extra_css %}{% endblock %}
</head>

<body>

  {% include "components/header.html" %}
  {% include "components/sidebar.html" %}

  <main class="main-wrapper">
    <div class="main-content">
      {% block content %}{% endblock %}
    </div>
  </main>

  <div class="overlay btn-toggle"></div>

  <footer class="page-footer">
    <p class="mb-0">Pod Café POS © 2026</p>
  </footer>

  <div class="search-content d-none"></div>

  <script src="/assets/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/jquery.min.js"></script>
  <script src="/assets/plugins/perfect-scrollbar/js/perfect-scrollbar.js"></script>
  <script src="/assets/plugins/metismenu/metisMenu.min.js"></script>
  <script src="/assets/plugins/simplebar/js/simplebar.min.js"></script>
  <script src="/assets/js/main.js"></script>
  <script src="/static/js/app.js"></script>

  <script>
    $(function () { $('#sidenav').metisMenu(); });

    (function () {
      var token = localStorage.getItem('access_token');
      if (!token) {
        window.location.replace('/login');
        return;
      }
      var payload = window.PodCafe ? PodCafe.payloadFromToken(token) : null;
      if (!payload) {
        window.location.replace('/login');
        return;
      }
      var sub = payload.sub || 'User';
      var role = payload.role || '';
      document.querySelectorAll('.js-user-email').forEach(function (el) {
        el.textContent = sub;
      });
      document.querySelectorAll('.js-user-role').forEach(function (el) {
        el.textContent = role;
      });
      if (role === 'cashier') {
        document.querySelectorAll('.js-admin-only').forEach(function (el) {
          var li = el.closest('li');
          if (li) li.classList.add('d-none');
        });
      }
    })();

    (function () {
      var el = document.getElementById('currentDate');
      if (el) el.textContent = new Date().toLocaleDateString('en-GB', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    })();

    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.logout-link').forEach(function (el) {
        el.addEventListener('click', function (e) {
          e.preventDefault();
          localStorage.removeItem('access_token');
          window.location.href = '/login';
        });
      });
    });
  </script>

  {% block extra_js %}{% endblock %}

</body>
</html>
