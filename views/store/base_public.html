<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Order online — Pod Café{% endblock %}</title>
  <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans', system-ui, sans-serif; }
    .product-card img { object-fit: cover; height: 140px; width: 100%; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand navbar-dark bg-dark mb-3">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/store">Pod Café</a>
      <div class="navbar-nav ms-auto gap-2 align-items-center flex-row">
        <a class="btn btn-sm btn-warning text-dark rounded-pill px-3 fw-semibold" href="/store/cart">
          Cart <span id="navCartCount" class="badge bg-dark ms-1">0</span>
        </a>
      </div>
    </div>
  </nav>
  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
  <script src="/assets/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/store.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
